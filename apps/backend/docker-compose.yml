services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: chronicle-api
    restart: unless-stopped
    ports:
      - '3000:3000'
    environment:
      NODE_ENV: production
      PORT: 3000
      DATABASE_URL: postgresql://chronicle:chronicle@postgres:5432/chronicle?schema=public
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD:-}
      REDIS_DB: 0
      BULLMQ_PREFIX: chronicle
      SWAGGER_ENABLED: 'true'
      API_PREFIX: api
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - chronicle

  postgres:
    image: postgres:16-alpine
    container_name: chronicle-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: chronicle
      POSTGRES_PASSWORD: chronicle
      POSTGRES_DB: chronicle
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U chronicle -d chronicle']
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - chronicle

  redis:
    image: redis:7-alpine
    container_name: chronicle-redis
    restart: unless-stopped
    ports:
      - '6379:6379'
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - chronicle

volumes:
  postgres_data:
  redis_data:

networks:
  chronicle:
    driver: bridge
