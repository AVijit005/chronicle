name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  NODE_VERSION: 22
  DATABASE_URL: postgresql://chronicle:chronicle@localhost:5432/chronicle

jobs:
  lint-format:
    name: Lint & Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
      - run: npm ci
        working-directory: apps/backend
      - run: npm run format
        working-directory: apps/backend
      - run: npm run lint
        working-directory: apps/backend

  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
      - run: npm ci
        working-directory: apps/backend
      - run: npx prisma generate
        working-directory: apps/backend
      - run: npm run build
        working-directory: apps/backend

  test:
    name: Tests
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: chronicle
          POSTGRES_USER: chronicle
          POSTGRES_PASSWORD: chronicle
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready -U chronicle
          --health-interval 5s
          --health-timeout 3s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
      - run: npm ci
        working-directory: apps/backend
      - run: npx prisma generate && npx prisma migrate deploy
        working-directory: apps/backend
        env:
          DATABASE_URL: ${{ env.DATABASE_URL }}
      - name: Verify no CASCADE on media FKs
        working-directory: apps/backend
        run: |
          npx prisma db execute --stdin --schema prisma/schema.prisma <<'SQL' > result.txt
            SELECT COUNT(*) FROM (
              SELECT tc.constraint_name, rc.delete_rule
              FROM information_schema.table_constraints tc
              JOIN information_schema.referential_constraints rc ON tc.constraint_name = rc.constraint_name
              JOIN information_schema.key_column_usage kcu ON tc.constraint_name = kcu.constraint_name
              WHERE tc.constraint_type = 'FOREIGN KEY'
                AND kcu.column_name IN ('movie_id','tv_show_id','anime_id','book_id','game_id',
                  'music_album_id','podcast_id','course_id','tv_season_id','tv_episode_id',
                  'anime_episode_id','course_module_id','course_lesson_id','podcast_episode_id','music_track_id')
                AND rc.delete_rule = 'CASCADE'
            ) t;
          SQL
          COUNT=$(cat result.txt | grep -o '[0-9]\+')
          echo "Cascade count: $COUNT"
          if [ "$COUNT" -gt 0 ]; then
            echo "FAILED: Media foreign keys still have CASCADE rules"
            exit 1
          fi
      - run: npm test
        working-directory: apps/backend
        env:
          DATABASE_URL: ${{ env.DATABASE_URL }}
          REDIS_HOST: localhost
          REDIS_PORT: 6379

  docker:
    name: Docker Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: docker build -t chronicle-api ./apps/backend
      - run: docker run --rm chronicle-api node dist/main --help || true

  security:
    name: Security Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
      - run: npm ci
        working-directory: apps/backend
      - run: npm audit --audit-level=high
        working-directory: apps/backend
      - name: TruffleHog Secret Scan
        uses: trufflesecurity/trufflehog@main
        with:
          path: ./
          base: ""
          head: ${{ github.ref_name }}
          extra_args: --only-verified
      - name: Verify analytics uses React Query
        run: |
          if grep -E "libraryStore|liveSelectors|STATS|MEDIA" src/routes/app.analytics.tsx; then
            echo "FAILED: app.analytics.tsx is importing localStorage store or mock arrays"
            exit 1
          fi
      - name: Verify frontend product killers
        run: |
          if grep -E "const goals = \[" src/routes/app.goals.tsx; then exit 1; fi
          if grep -E "const items = \[" src/routes/app.achievements.tsx; then exit 1; fi
          if ! grep -q "onClick" src/routes/app.wrapped.tsx; then exit 1; fi
          if grep -q "mood: \"Reflective\"" src/routes/app.journal.tsx; then exit 1; fi
          if grep -q "onClick={onOpenSearch}" src/components/layout/MobileNav.tsx; then exit 1; fi

  launch-gate:
    name: Launch Gate (Production Proof)
    runs-on: ubuntu-latest
    needs: [test, security]
    steps:
      - uses: actions/checkout@v4
      - name: Verify CORS config
        run: |
          if grep -q "CORS_ORIGIN === 'true'" apps/backend/src/app.bootstrap.ts; then
            echo "FAILED: Open CORS reflection detected"
            exit 1
          fi
      - name: Verify CSP scriptSrc
        run: |
          if grep "scriptSrc" apps/backend/src/app.bootstrap.ts | grep -q -E "unsafe-eval|unsafe-inline"; then
            echo "FAILED: Unsafe CSP directives detected in scriptSrc"
            exit 1
          fi
      - run: echo "All critical production invariants (Cascade FKs, Secrets, Swagger, Email, RBAC, Analytics, CORS, CSP) have been machine-verified."
